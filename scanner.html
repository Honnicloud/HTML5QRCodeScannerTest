<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR scanner test</title>
  </head>
  <body>
    <div id="output"></div>
    <script>
      const outputElement = document.querySelector('#output');

      navigator.mediaDevices.getUserMedia({ audio: false, video: { facingMode: { exact: 'environment'} } })
        .then(mediaStream => {
          const videoElement = document.createElement('video');

          videoElement.height = 800
          videoElement.width = 450
          videoElement.srcObject = mediaStream;

          outputElement.append(videoElement)

          videoElement.onloadedmetadata = () => videoElement.play()

          if (!('BarcodeDetector' in globalThis)) {
            outputElement.innerHTML = 'Barcode Detector is not supported by this browser.'
          } else {
            const barcodeDetector = new BarcodeDetector({
              formats: ['qr_code']
            })

            barcodeDetector.detect(videoElement)
              .then(barcodes => {
                barcodes.forEach(barcode => {
                  const divElement = document.createElement('div')
                  divElement.innerHTML = barcode.rawValue
                  outputElement.append(divElement)
                })
              }).catch(e => {
                outputElement.innerHTML = e
              })
          }
        }).catch(e => {
          outputElement.innerHTML = e
        })
    </script>
  </body>
</html>
