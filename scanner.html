<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR scanner test</title>
  </head>
  <body>
    <div id="output"></div>
    <script>
      const outputElement = document.querySelector('#output');

      async function scanForQrCodes(mediaStream) {
        if (!('BarcodeDetector' in globalThis)) {
          outputElement.innerHTML = 'Barcode Detector is not supported by this browser.'
        } else {
          const barcodeDetector = new BarcodeDetector({
            formats: ['qr_code']
          })

          const track = mediaStream.getVideoTracks()[0];
          const mediaProcessor = new MediaStreamTrackProcessor(track);

          const reader = mediaProcessor.readable.getReader();
          while (true) {
            const result = await reader.read();
            if (result.done) break;

            let frame = result.value;
            if (frame.done) { break }
            const frameFromCamera = result.value
            barcodeDetector.detect(frameFromCamera)
              .then(barcodes => {
                barcodes.forEach(barcode => {
                  const divElement = document.createElement('div')
                  divElement.innerHTML = barcode.rawValue
                  outputElement.append(divElement)
                })
              }).catch(e => {
                const divElement = document.createElement('div')
                divElement.innerHTML = e
                outputElement.append(divElement)
              })
          }
        }
      }

      navigator.mediaDevices.getUserMedia({ audio: false, video: true })
        .then(mediaStream => {
          const videoElement = document.createElement('video');

          videoElement.height = 400
          videoElement.width = 225
          videoElement.srcObject = mediaStream;

          outputElement.append(videoElement)

          videoElement.onloadedmetadata = () => videoElement.play()

          scanForQrCodes(mediaStream)
        }).catch(e => {
          const divElement = document.createElement('div')
          divElement.innerHTML = e
          outputElement.append(divElement)
        })
    </script>
  </body>
</html>
